{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>BNEXT | Consultas IA</title>

    <style>
        :root {
            --bg-dark: #070b14;
            --sidebar-bg: #0b1120;
            --glass-bg: rgba(17, 24, 39, 0.8);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR (MISMO QUE DASHBOARD) ===== */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            padding: 30px 20px;
            position: fixed;
            height: calc(100vh - 40px);
            left: 20px; top: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar a {
            display: flex; align-items: center; padding: 12px 15px;
            border-radius: 12px; color: var(--text-muted); text-decoration: none;
            margin-bottom: 5px; transition: 0.3s; font-size: 14px;
        }

        .sidebar a i { margin-right: 12px; width: 20px; text-align: center; }
        .sidebar a:hover, .sidebar a.active { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); }
        .sidebar a.active { background: var(--accent-blue); color: white; }

        /* ===== MAIN AREA ===== */
        .main { 
            margin-left: 290px; 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header del Chat */
        .chat-header {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header img {
            width: 45px; height: 45px;
            border-radius: 12px;
            background: var(--accent-blue);
            padding: 5px;
        }

        .chat-header h2 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Área de Mensajes */
        #chatLog {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-blue) transparent;
        }

        .msg { max-width: 80%; padding: 14px 18px; line-height: 1.5; font-size: 14px; position: relative; }

        .user-msg {
            align-self: flex-end;
            background: var(--accent-blue);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }

        .bot-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 20px 4px;
        }

        /* Área de Input */
        .input-area {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        button {
            padding: 0 25px;
            border-radius: 15px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { background: #2563eb; transform: translateY(-1px); }

        /* Estilo para el Scroll */
        #chatLog::-webkit-scrollbar { width: 6px; }
        #chatLog::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 0 15px; margin-bottom: 30px;">
        <h2 style="color: var(--accent-blue); margin: 0;">BNEXT <span style="color:white; font-weight:300;">INV</span></h2>
    </div>
    <a href="/"><i class="fa-solid fa-house"></i> Panel General</a>
    <a href="/equipos/"><i class="fa-solid fa-laptop-code"></i> Inventario</a>
    <a href="/sobre-nosotros/"><i class="fa-solid fa-building"></i> Corporativo</a>
    <a href="/chatbot/" class="active"><i class="fa-solid fa-robot"></i> Consultas IA</a>
    <div style="margin-top:auto">
        <a href="/accounts/logout/" style="color: var(--accent-red);"><i class="fa-solid fa-power-off"></i> Finalizar Sesión</a>
    </div>
</div>

<div class="main">
    <div class="chat-container">
        <div class="chat-header">
            <img src="{% static 'inventario/IA.png' %}" alt="IA Bnext">
            <div>
                <h2>IAntario Assistant</h2>
                <span style="font-size: 11px; color: var(--text-muted);"><span class="status-dot"></span> En línea | Consultor de Inventario</span>
            </div>
        </div>

        <div id="chatLog">
            <div class="msg bot-msg">
                ¡Hola! Soy el asistente inteligente de BNEXT. ¿En qué puedo ayudarte con el inventario hoy?
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Pregúntame sobre equipos, estados o anomalías...">
            </div>
            <button onclick="enviar()">
                <span>Enviar</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
function enviar(){
    let input = document.getElementById("chatInput");
    let msg = input.value.trim();
    if(msg === "") return;

    let log = document.getElementById("chatLog");

    // Mensaje Usuario
    log.innerHTML += `<div class="msg user-msg">${msg}</div>`;
    
    // Auto-scroll
    log.scrollTop = log.scrollHeight;
    input.value = "";

    // Simulación de carga (opcional, podrías poner un "escribiendo...")
    fetch(`/chatbot-api/?msg=${msg}`)
    .then(response => response.json())
    .then(data => {
        log.innerHTML += `<div class="msg bot-msg">${data.reply}</div>`;
        log.scrollTop = log.scrollHeight;
    });
}

document.getElementById("chatInput").addEventListener("keypress", function(e){
    if(e.key === "Enter") enviar();
});
</script>

</body>
</html>
