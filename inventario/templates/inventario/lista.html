<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Equipos | BNEXT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== BASE & BACKGROUND ===== */
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        /* ===== HEADER AREA ===== */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== BOTONES SUPERIORES ===== */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn-base {
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-regresar {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-regresar:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nuevo-equipo {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .nuevo-equipo:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4);
        }

        /* ===== TABLA FUTURISTA ===== */
        .table-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #e2e8f0;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 18px 20px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* ===== BADGES DE ESTADO ===== */
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-activo { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-reparacion { background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .status-baja { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* ===== BOTONES ACCIÓN ===== */
        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-edit { 
            background: rgba(59, 130, 246, 0.1); 
            color: #60a5fa; 
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .btn-edit:hover { background: #3b82f6; color: white; }

        .btn-delete { 
            background: rgba(239, 68, 68, 0.1); 
            color: #f87171; 
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-delete:hover { background: #ef4444; color: white; }

    </style>
</head>
<body>

<div class="header-container">
    <h1><i class="fa-solid fa-microchip" style="margin-right: 10px;"></i> Gestión de Inventario</h1>
    
    <div class="btn-group">
        <a href="{% url 'dashboard' %}" class="btn-base btn-regresar">
            <i class="fa-solid fa-house"></i> Inicio
        </a>
        <a href="/equipos/nuevo/" class="btn-base nuevo-equipo">
            <i class="fa-solid fa-plus"></i> Añadir Activo
        </a>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Asignado</th>
                <th>Marca</th>
                <th>Estado Actual</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for e in equipos %}
            <tr>
                <td style="color: #64748b; font-weight: 700;">#{{ e.id }}</td>
                <td style="font-weight: 600;">{{ e.nombre }}</td>
                <td><i class="fa-solid fa-tag" style="font-size: 0.8rem; opacity: 0.5;"></i> {{ e.marca }}</td>
                <td>
                    <span class="status-badge {% if e.estado == 'activo' %}status-activo{% elif e.estado == 'reparacion' %}status-reparacion{% else %}status-baja{% endif %}">
                        {{ e.estado }}
                    </span>
                </td>
                <td>
                    <div class="action-btns" style="justify-content: center;">
                        <a href="/equipos/editar/{{ e.id }}" class="btn-action btn-edit" title="Editar">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </a>
                        <a href="/equipos/eliminar/{{ e.id }}" class="btn-action btn-delete" title="Eliminar">
                            <i class="fa-solid fa-trash-can"></i>
                        </a>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
