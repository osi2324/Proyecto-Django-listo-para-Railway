<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro de Equipo | BNEXT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== FONDO DINÁMICO FUTURISTA ===== */
        body, html {
            height: 100%;
            margin: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* Destello azul de fondo */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(37, 99, 235, 0.2);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            top: 10%;
            left: 10%;
        }

        /* ===== CONTENEDOR GLASSMORPHISM ===== */
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            width: 450px;
            max-width: 90vw;
            position: relative; /* Para posicionar la X dentro */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== BOTÓN VOLVER (X) POSICIONADO ===== */
        .header-actions {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-back-minimal {
            color: rgba(148, 163, 184, 0.7);
            font-size: 22px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-back-minimal:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            transform: rotate(90deg);
        }

        /* ===== CABECERA ===== */
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .pulse-icon {
            font-size: 40px;
            color: #3b82f6;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            animation: pulse 2s infinite;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* ===== FORMULARIO (Django as_p) ===== */
        form p {
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 5px;
        }

        input, select, textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px 16px !important;
            color: #fff !important;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            background: rgba(15, 23, 42, 0.8) !important;
        }

        /* ===== BOTÓN GUARDAR ===== */
        .submit-btn {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <a href="{% url 'dashboard' %}" class="btn-back-minimal" title="Cancelar y volver">
            <i class="fa-solid fa-xmark"></i>
        </a>
    </div>

    <div class="form-header">
        <i class="fa-solid fa-microchip pulse-icon"></i>
        <h1>Sincronizar Equipo</h1>
    </div>

    <form method="POST" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="submit-btn">
            Guardar Registro <i class="fa-solid fa-bolt" style="margin-left: 8px;"></i>
        </button>
    </form>
</div>

</body>
</html>
